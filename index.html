<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正直香蕉 Straight Banana | 遊戲開發工作室</title>
    
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: 選擇比較活潑的字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1a1a;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        
        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #FACC15; 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #EAB308; 
        }

        /* 香蕉搖晃動畫 */
        @keyframes banana-shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        
        .hover-shake:hover {
            animation: banana-shake 0.5s ease-in-out;
        }

        /* 故障文字效果 (Glitch) */
        .glitch-text {
            position: relative;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(30px, 9999px, 10px, 0); }
            20% { clip: rect(80px, 9999px, 90px, 0); }
            40% { clip: rect(10px, 9999px, 50px, 0); }
            60% { clip: rect(60px, 9999px, 20px, 0); }
            80% { clip: rect(40px, 9999px, 70px, 0); }
            100% { clip: rect(20px, 9999px, 80px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(15px, 9999px, 60px, 0); }
            20% { clip: rect(45px, 9999px, 30px, 0); }
            40% { clip: rect(85px, 9999px, 15px, 0); }
            60% { clip: rect(25px, 9999px, 75px, 0); }
            80% { clip: rect(65px, 9999px, 35px, 0); }
            100% { clip: rect(55px, 9999px, 45px, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 翻譯資料 ---
        const translations = {
            zh: {
                nav: {
                    about: '關於我們',
                    features: '工作室特色',
                    games: '遊戲作品',
                    contact: '聯絡方式'
                },
                hero: {
                    tag: 'Indie Game Studio',
                    title: '正直香蕉',
                    subtitlePrefix: 'Straight',
                    subtitleSuffix: 'Banana',
                    desc: '我們不只是做遊戲，我們製造混亂與歡樂。\n致力於開發那些讓你嘴角上揚、腦洞大開的不尋常體驗。',
                    btnGames: '看作品',
                    btnContact: '聯絡我們'
                },
                features: {
                    sectionTitle: '我們是誰？',
                    items: [
                        {
                            title: "絕對不正經",
                            desc: "正經的遊戲太多了，我們專注於那些讓你在地鐵上忍不住笑出聲的時刻。"
                        },
                        {
                            title: "創意基因",
                            desc: "拒絕換皮遊戲。每一個像素、每一行代碼都注入了我們獨特的怪異 DNA。"
                        },
                        {
                            title: "玩家至上",
                            desc: "我們聽取社群的聲音（雖然有時候會故意曲解意思來製造驚喜）。"
                        }
                    ],
                    aboutTitle: '正直香蕉哲學',
                    aboutDesc1: '為什麼叫「正直香蕉」？因為香蕉本來就是彎的，想要它變直，就得打破常規、用力過猛，或者換個角度看世界。',
                    aboutDesc2: '這就是我們的開發理念：用最硬核的技術，做最軟爛（有趣）的遊戲。我們是一群熱愛遊戲的開發者，致力於為這個世界增添一點黃色的快樂能量。'
                },
                games: {
                    sectionTitle: '作品展示',
                    sectionDesc: '我們的心血結晶（還有一些熬夜掉的頭髮）',
                    github: '查看 GitHub',
                    items: [
                        {
                            title: "香蕉滑倒大冒險",
                            genre: "動作 / 惡搞",
                            desc: "扮演一根不想被吃掉的香蕉，利用滑倒物理引擎，絆倒所有試圖抓住你的廚師。",
                            status: "開發中"
                        },
                        {
                            title: "像素貓咪格鬥",
                            genre: "格鬥 / 像素風",
                            desc: "可愛的貓咪，硬核的連招。每一拳都帶有肉球的柔軟與破壞力。",
                            status: "已發布"
                        },
                        {
                            title: "辦公室生存法則",
                            genre: "策略 / 模擬",
                            desc: "在極度無聊的辦公室裡，通過摸魚、喝咖啡和假裝打字來存活下去。",
                            status: "原型階段"
                        }
                    ],
                    learnMore: '了解更多'
                },
                footer: {
                    title: '準備好開始胡鬧了嗎？',
                    desc: '無論您是有瘋狂的遊戲點子，還是想找我們合作，或者只是想傳一張香蕉的迷因圖給我們，我們都歡迎。',
                    form: {
                        name: '您的大名',
                        namePlace: '蕉農一號',
                        email: 'Email',
                        emailPlace: 'banana@example.com',
                        message: '訊息內容',
                        messagePlace: '嗨！我覺得你們的遊戲...',
                        btn: '發送訊息'
                    },
                    copyright: 'Straight Banana Studio. Made with'
                }
            },
            en: {
                nav: {
                    about: 'About Us',
                    features: 'Features',
                    games: 'Games',
                    contact: 'Contact'
                },
                hero: {
                    tag: 'Indie Game Studio',
                    title: 'Straight Banana',
                    subtitlePrefix: 'Straight',
                    subtitleSuffix: 'Banana',
                    desc: 'We don\'t just make games, we manufacture chaos and joy.\nDedicated to creating unusual experiences that make you grin and blow your mind.',
                    btnGames: 'Our Games',
                    btnContact: 'Contact Us'
                },
                features: {
                    sectionTitle: 'Who We Are',
                    items: [
                        {
                            title: "Absolutely Unserious",
                            desc: "There are too many serious games. We focus on moments that make you laugh out loud on the subway."
                        },
                        {
                            title: "Creative DNA",
                            desc: "No reskins here. Every pixel and line of code is injected with our unique, weird DNA."
                        },
                        {
                            title: "Players First",
                            desc: "We listen to the community (though sometimes we deliberately misinterpret things to create surprises)."
                        }
                    ],
                    aboutTitle: 'Straight Banana Philosophy',
                    aboutDesc1: 'Why "Straight Banana"? Because bananas are naturally curved. To make one straight, you have to break the rules, try too hard, or just look at the world differently.',
                    aboutDesc2: 'That\'s our dev philosophy: using hardcore tech to make "soft" (fun) games. We are devs who love adding a little yellow energy to the world.'
                },
                games: {
                    sectionTitle: 'Our Games',
                    sectionDesc: 'Our blood, sweat, and tears (and some hair lost to late nights)',
                    github: 'Check GitHub',
                    items: [
                        {
                            title: "Banana Slip Adventure",
                            genre: "Action / Comedy",
                            desc: "Play as a banana avoiding being eaten. Use physics to slip up every chef trying to catch you.",
                            status: "In Dev"
                        },
                        {
                            title: "Pixel Cat Fight",
                            genre: "Fighting / Pixel Art",
                            desc: "Cute cats, hardcore combos. Every punch packs the softness and destruction of a paw pad.",
                            status: "Released"
                        },
                        {
                            title: "Office Survival Guide",
                            genre: "Strategy / Sim",
                            desc: "Survive a boring office by slacking off, drinking coffee, and pretending to type.",
                            status: "Prototype"
                        }
                    ],
                    learnMore: 'Learn More'
                },
                footer: {
                    title: 'Ready to Monkey Around?',
                    desc: 'Whether you have crazy game ideas, want to collab, or just want to send us a banana meme, we welcome it.',
                    form: {
                        name: 'Your Name',
                        namePlace: 'Banana Farmer #1',
                        email: 'Email',
                        emailPlace: 'banana@example.com',
                        message: 'Message',
                        messagePlace: 'Hi! I think your games are...',
                        btn: 'Send Message'
                    },
                    copyright: 'Straight Banana Studio. Made with'
                }
            }
        };

        // --- 內建圖標元件 (解決 Lucide 引用錯誤) ---
        const Icon = ({ children, className }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Menu = ({ className }) => <Icon className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
        const X = ({ className }) => <Icon className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const ArrowRight = ({ className }) => <Icon className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const Gamepad2 = ({ className }) => <Icon className={className}><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></Icon>;
        const Zap = ({ className }) => <Icon className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const MessageCircle = ({ className }) => <Icon className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></Icon>;
        const Dna = ({ className }) => <Icon className={className}><path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.8-2 2.5-4 2.8-6"/><path d="M15 2c-1.8 2-2.5 4-2.8 6"/></Icon>;
        const Mail = ({ className }) => <Icon className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>;
        const Github = ({ className }) => <Icon className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></Icon>;
        const Twitter = ({ className }) => <Icon className={className}><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></Icon>;
        const Globe = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;

        // 香蕉 SVG 圖標組件
        const BananaIcon = ({ className }) => (
            <svg 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                <path d="M4 13c3.5-2 8-2 10 2a5.5 5.5 0 0 1 8 5" />
                <path d="M5.15 17a9 9 0 1 0 17.77-9" />
                <path d="M15 8c-1.5 2-2.5 5-2.5 8" />
                <path d="M4 13a3 3 0 0 0-1 5" />
            </svg>
        );

        // 導航欄
        const Navbar = ({ lang, setLang }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const t = translations[lang].nav;

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const toggleLang = () => {
                setLang(prev => prev === 'zh' ? 'en' : 'zh');
            };

            const navLinks = [
                { name: t.about, href: '#about' },
                { name: t.features, href: '#features' },
                { name: t.games, href: '#games' },
                { name: t.contact, href: '#contact' },
            ];

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-black/90 backdrop-blur-md py-2 border-b border-yellow-500/20' : 'bg-transparent py-4'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <a href="#" className="flex items-center space-x-2 group">
                            <div className="bg-yellow-400 p-2 rounded-lg text-black group-hover:rotate-12 transition-transform duration-300">
                                <BananaIcon className="w-6 h-6" />
                            </div>
                            <span className="text-xl font-black tracking-wider text-white">
                                STRAIGHT <span className="text-yellow-400">BANANA</span>
                            </span>
                        </a>

                        {/* Desktop Menu */}
                        <div className="hidden md:flex items-center space-x-8">
                            {navLinks.map((link) => (
                                <a 
                                    key={link.name} 
                                    href={link.href}
                                    className="text-gray-300 hover:text-yellow-400 font-bold transition-colors text-sm tracking-wide"
                                >
                                    {link.name}
                                </a>
                            ))}
                            {/* Language Switcher */}
                            <button 
                                onClick={toggleLang}
                                className="flex items-center space-x-1 text-gray-300 hover:text-yellow-400 font-bold transition-colors border border-neutral-700 px-3 py-1 rounded-full hover:bg-neutral-800"
                            >
                                <Globe className="w-4 h-4" />
                                <span className="text-sm">{lang === 'zh' ? 'EN' : '中'}</span>
                            </button>
                        </div>

                        {/* Mobile Menu Button Group */}
                        <div className="md:hidden flex items-center space-x-4">
                            <button 
                                onClick={toggleLang}
                                className="text-white hover:text-yellow-400 flex items-center gap-1 border border-neutral-700 px-2 py-1 rounded-lg"
                            >
                                <Globe className="w-5 h-5" />
                                <span className="text-xs font-bold">{lang.toUpperCase()}</span>
                            </button>
                            <button 
                                className="text-white hover:text-yellow-400"
                                onClick={() => setIsOpen(!isOpen)}
                            >
                                {isOpen ? <X className="w-6 h-6" /> : <Menu className="w-6 h-6" />}
                            </button>
                        </div>
                    </div>

                    {/* Mobile Menu Overlay */}
                    {isOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-neutral-900 border-t border-neutral-800 p-4 flex flex-col space-y-4 shadow-xl">
                            {navLinks.map((link) => (
                                <a 
                                    key={link.name} 
                                    href={link.href}
                                    className="text-white hover:text-yellow-400 font-bold block py-2 border-b border-neutral-800"
                                    onClick={() => setIsOpen(false)}
                                >
                                    {link.name}
                                </a>
                            ))}
                        </div>
                    )}
                </nav>
            );
        };

        // 英雄區塊 (Hero Section)
        const Hero = ({ lang }) => {
            const t = translations[lang].hero;
            return (
                <section className="relative min-h-screen flex items-center justify-center overflow-hidden pt-20">
                    {/* 背景裝飾 */}
                    <div className="absolute inset-0 z-0">
                        <div className="absolute top-20 left-10 w-72 h-72 bg-yellow-500/10 rounded-full blur-3xl animate-pulse"></div>
                        <div className="absolute bottom-20 right-10 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl animate-pulse" style={{animationDelay: '1s'}}></div>
                    </div>

                    <div className="container mx-auto px-6 relative z-10 text-center">
                        <div className="inline-block mb-4 px-4 py-1 border border-yellow-500/50 rounded-full bg-yellow-500/10 text-yellow-400 text-sm font-bold tracking-widest uppercase">
                            {t.tag}
                        </div>
                        <h1 className="text-5xl md:text-7xl lg:text-8xl font-black mb-6 leading-tight text-white glitch-text" data-text={t.title}>
                            {t.title}
                        </h1>
                        <h2 className="text-3xl md:text-5xl font-bold text-gray-400 mb-8">
                            {t.subtitlePrefix} <span className="text-yellow-400 underline decoration-wavy decoration-4 underline-offset-8">{t.subtitleSuffix}</span>
                        </h2>
                        <p className="text-lg md:text-xl text-gray-300 max-w-2xl mx-auto mb-10 leading-relaxed whitespace-pre-line">
                            {t.desc}
                        </p>
                        <div className="flex flex-col md:flex-row justify-center items-center gap-4">
                            <a href="#games" className="group relative px-8 py-4 bg-yellow-400 text-black font-black text-lg rounded-xl overflow-hidden transition-transform hover:scale-105 active:scale-95">
                                <span className="relative z-10 flex items-center gap-2">
                                    {t.btnGames} <Gamepad2 className="w-5 h-5" />
                                </span>
                                <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                            </a>
                            <a href="#contact" className="px-8 py-4 border-2 border-neutral-700 text-white font-bold text-lg rounded-xl hover:bg-neutral-800 transition-colors">
                                {t.btnContact}
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        // 關於與特色
        const Features = ({ lang }) => {
            const t = translations[lang].features;
            const features = [
                {
                    icon: <Zap className="w-8 h-8 text-yellow-400" />,
                    ...t.items[0]
                },
                {
                    icon: <Dna className="w-8 h-8 text-purple-400" />,
                    ...t.items[1]
                },
                {
                    icon: <MessageCircle className="w-8 h-8 text-green-400" />,
                    ...t.items[2]
                }
            ];

            return (
                <section id="features" className="py-24 bg-neutral-900">
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-16">
                            <h3 className="text-3xl md:text-4xl font-black mb-4 text-white">{t.sectionTitle}</h3>
                            <div className="w-24 h-2 bg-yellow-400 mx-auto rounded-full"></div>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8">
                            {features.map((feature, idx) => (
                                <div key={idx} className="bg-neutral-800/50 p-8 rounded-2xl border border-neutral-700 hover:border-yellow-400/50 transition-all hover:-translate-y-2 duration-300 group">
                                    <div className="bg-neutral-900 w-16 h-16 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                                        {feature.icon}
                                    </div>
                                    <h4 className="text-xl font-bold text-white mb-3">{feature.title}</h4>
                                    <p className="text-gray-400 leading-relaxed">
                                        {feature.desc}
                                    </p>
                                </div>
                            ))}
                        </div>
                        
                        {/* 關於我們文字區 */}
                        <div id="about" className="mt-24 max-w-4xl mx-auto bg-black p-8 md:p-12 rounded-3xl border border-neutral-800 relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-yellow-400/20 rounded-full blur-3xl"></div>
                            <div className="flex flex-col md:flex-row items-center gap-8">
                                <div className="flex-shrink-0">
                                    <div className="w-32 h-32 bg-yellow-400 rounded-full flex items-center justify-center text-black shadow-[0_0_30px_rgba(250,204,21,0.3)]">
                                        <BananaIcon className="w-16 h-16 hover-shake cursor-pointer" />
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-2xl font-bold text-white mb-4">{t.aboutTitle}</h3>
                                    <p className="text-gray-300 mb-4">
                                        {t.aboutDesc1}
                                    </p>
                                    <p className="text-gray-300">
                                        {t.aboutDesc2}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // 遊戲展示
        const Games = ({ lang }) => {
            const t = translations[lang].games;
            const games = [
                {
                    color: "from-yellow-400 to-orange-500",
                    ...t.items[0]
                },
                {
                    color: "from-purple-500 to-indigo-600",
                    ...t.items[1]
                },
                {
                    color: "from-blue-400 to-cyan-500",
                    ...t.items[2]
                }
            ];

            return (
                <section id="games" className="py-24 bg-black relative">
                     <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9IiMzMzMiLz48L3N2Zz4=')] opacity-20"></div>
                    <div className="container mx-auto px-6 relative z-10">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16">
                            <div>
                                <h3 className="text-4xl md:text-5xl font-black text-white mb-2">{t.sectionTitle}</h3>
                                <p className="text-gray-400">{t.sectionDesc}</p>
                            </div>
                            <a href="#" className="hidden md:flex items-center text-yellow-400 font-bold hover:text-white transition-colors mt-4 md:mt-0">
                                {t.github} <ArrowRight className="w-4 h-4 ml-2" />
                            </a>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {games.map((game, idx) => (
                                <div key={idx} className="group relative bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-800 hover:border-yellow-500/50 transition-all duration-500">
                                    {/* 模擬遊戲封面圖 */}
                                    <div className={`h-48 w-full bg-gradient-to-br ${game.color} relative overflow-hidden`}>
                                        <div className="absolute inset-0 flex items-center justify-center opacity-30 group-hover:opacity-10 transition-opacity duration-500">
                                            <Gamepad2 className="w-24 h-24 text-black" />
                                        </div>
                                        <div className="absolute top-4 right-4 bg-black/50 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-white border border-white/10">
                                            {game.status}
                                        </div>
                                    </div>
                                    
                                    <div className="p-8">
                                        <div className="text-sm font-bold text-yellow-500 mb-2">{game.genre}</div>
                                        <h4 className="text-2xl font-bold text-white mb-3 group-hover:text-yellow-400 transition-colors">{game.title}</h4>
                                        <p className="text-gray-400 text-sm leading-relaxed mb-6">
                                            {game.desc}
                                        </p>
                                        <button className="w-full py-3 rounded-xl bg-neutral-800 text-white font-bold hover:bg-white hover:text-black transition-all duration-300">
                                            {t.learnMore}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="mt-8 text-center md:hidden">
                             <a href="#" className="inline-flex items-center text-yellow-400 font-bold hover:text-white transition-colors">
                                {t.github} <ArrowRight className="w-4 h-4 ml-2" />
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        // 聯絡我們與頁尾
        const Footer = ({ lang }) => {
            const t = translations[lang].footer;
            return (
                <footer id="contact" className="bg-neutral-900 border-t border-neutral-800">
                    <div className="container mx-auto px-6 py-16">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            <div>
                                <h3 className="text-3xl font-black text-white mb-6">{t.title}</h3>
                                <p className="text-gray-400 mb-8 max-w-md">
                                    {t.desc}
                                </p>
                                <div className="space-y-4">
                                    <a href="mailto:hello@straightbanana.studio" className="flex items-center space-x-4 text-white hover:text-yellow-400 transition-colors bg-neutral-800 p-4 rounded-xl border border-neutral-700 w-fit">
                                        <Mail className="w-5 h-5" />
                                        <span className="font-bold">hello@straightbanana.studio</span>
                                    </a>
                                    <div className="flex space-x-4 mt-6">
                                        <a href="#" className="w-12 h-12 bg-neutral-800 rounded-full flex items-center justify-center text-white hover:bg-yellow-400 hover:text-black transition-all duration-300">
                                            <Github className="w-5 h-5" />
                                        </a>
                                        <a href="#" className="w-12 h-12 bg-neutral-800 rounded-full flex items-center justify-center text-white hover:bg-[#1DA1F2] hover:text-white transition-all duration-300">
                                            <Twitter className="w-5 h-5" />
                                        </a>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 簡易表單 */}
                            <form className="bg-black p-8 rounded-3xl border border-neutral-800 shadow-2xl" onSubmit={(e) => e.preventDefault()}>
                                <div className="mb-4">
                                    <label className="block text-gray-500 text-sm font-bold mb-2">{t.form.name}</label>
                                    <input type="text" className="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-400 transition-colors" placeholder={t.form.namePlace} />
                                </div>
                                <div className="mb-4">
                                    <label className="block text-gray-500 text-sm font-bold mb-2">{t.form.email}</label>
                                    <input type="email" className="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-400 transition-colors" placeholder={t.form.emailPlace} />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-gray-500 text-sm font-bold mb-2">{t.form.message}</label>
                                    <textarea rows="4" className="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-400 transition-colors" placeholder={t.form.messagePlace}></textarea>
                                </div>
                                <button className="w-full bg-yellow-400 text-black font-black py-4 rounded-xl hover:bg-yellow-300 transition-colors flex items-center justify-center gap-2">
                                    {t.form.btn} <Zap className="w-4 h-4" />
                                </button>
                            </form>
                        </div>
                    </div>
                    
                    <div className="border-t border-neutral-800 bg-black py-8 text-center">
                        <p className="text-gray-600 text-sm flex items-center justify-center gap-2">
                            © {new Date().getFullYear()} {t.copyright} <BananaIcon className="w-4 h-4 text-yellow-400" /> and Chaos.
                        </p>
                    </div>
                </footer>
            );
        };

        // 主應用
        const App = () => {
            // 預設語言為中文 'zh'
            const [lang, setLang] = useState('zh');

            return (
                <div className="antialiased selection:bg-yellow-400 selection:text-black">
                    <Navbar lang={lang} setLang={setLang} />
                    <Hero lang={lang} />
                    <Features lang={lang} />
                    <Games lang={lang} />
                    <Footer lang={lang} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
