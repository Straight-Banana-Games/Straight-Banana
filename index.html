<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正直香蕉 Straight Banana | 遊戲開發工作室</title>
    <link rel="icon" type="image/png" href="images/studio_favicon.png">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        banana: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#ffd543',
                            600: '#d97706',
                        },
                        studio: {
                            light: '#ffffff',
                            bg: '#f8fafc',
                            text: '#42362A',
                            accent: '#3b82f6'
                        }
                    },
                    fontFamily: {
                        sans: ['LINE Seed JP', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'LINE Seed JP', sans-serif;
            background-color: #ffffff;
            color: #42362A;
            overflow-x: hidden;
        }

        section {
            scroll-margin-top: 70px;
        }

        .highlight-yellow {
            background-color: #ffd543;
            padding: 0 6px;
            display: inline;
        }

        .highlight-yellow-full {
            background-color: #ffd543;
            padding: 2px 6px;
            display: inline;
        }

        @keyframes copyFadeUp {
            0% {
                opacity: 0;
                transform: translate(-50%, 5px);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -2px);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -10px);
            }
        }

        .animate-copy-success {
            animation: copyFadeUp 1s ease-out forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Translations ---
        const translations = {
            zh: {
                nav: { home: '首頁', games: '我們的遊戲', about: '關於我們', contact: '聯絡我們' },
                hero: { title: '我們是', titleHighlight: '正直香蕉', subtitle: '來自台灣的雙人獨立遊戲工作室', btnGames: '我們的遊戲', btnContact: '聯絡我們' },
                games: {
                    title: '我們的遊戲',
                    tag: '2026/5 試玩版釋出!!',
                    name: '自拍蟲蟲',
                    desc: '這是一款結合軟 Q 物理與攝影的桌面夥伴。熱愛自拍的蟲蟲發現鏡頭能拍出色彩，展開找回色彩的旅程。內建「防老闆鍵」與番茄鐘，讓專注後的休息成為療癒冒險。'
                },
                about: {
                    title: '關於我們',
                    introTitle: '我們熱愛製作',
                    introDesc: '有點奇怪、有點搞笑、又有點動人心弦的遊戲。\n特別喜歡那種說不上來的微妙感，',
                    introHighlight: '彷彿一根筆直的香蕉。',
                    teamTitle: '團隊成員',
                    members: [
                        { name: "Luke Liu", role: "Co-Founder, Game Designer", intro: "做遊戲比玩遊戲好玩。" },
                        { name: "Linda Huang", role: "Co-Founder, Technical Artist", intro: "細心觀察世界，轉化為玩家的驚喜。" },
                    ]
                },
                contact: {
                    title: '聯絡我們',
                    copySuccess: '複製成功'
                }
            },
            en: {
                nav: { home: 'Home', games: 'Games', about: 'About', contact: 'Contact' },
                hero: { title: 'We are ', titleHighlight: 'Straight Banana', subtitle: 'A Two-Person Indie Game Studio from Taiwan', btnGames: 'Our Games', btnContact: 'Contact Us' },
                games: {
                    title: 'Our Games',
                    tag: 'Demo releasing 2026/5!!',
                    name: 'Selfie Worm',
                    desc: 'A desktop companion blending squishy physics with photography. A selfie-loving worm discovers color through the lens and embarks on a journey to find it all. Features a "Boss Key" and Pomodoro timer.'
                },
                about: {
                    title: 'About Us',
                    introTitle: 'We Love Creating',
                    introDesc: 'Games that are a bit weird, a bit funny, and a bit moving.\nWe especially love that indescribable subtle feeling,',
                    introHighlight: 'just like a straight banana.',
                    teamTitle: 'Team Members',
                    members: [
                        { name: "Luke Liu", role: "Co-Founder, Game Designer", intro: "Making games is more fun than playing them." },
                        { name: "Linda Huang", role: "Co-Founder, Technical Artist", intro: "Observe the world carefully, turn it into surprises for players." },
                    ]
                },
                contact: {
                    title: 'Contact Us',
                    copySuccess: 'Email Copied'
                }
            }
        };

        // --- Icons ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const MenuIcon = ({ className }) => <Icon className={className}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></Icon>;
        const XIcon = ({ className }) => <Icon className={className}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></Icon>;

        // --- Components ---

        /* ===== NAVBAR ===== */
        const Navbar = ({ lang, setLang, t }) => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const links = [
                { name: t.nav.home, href: '#home' },
                { name: t.nav.games, href: '#games' },
                { name: t.nav.about, href: '#about' },
                { name: t.nav.contact, href: '#contact' },
            ];

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/90 backdrop-blur shadow-sm py-2' : 'bg-white/90 backdrop-blur py-4'}`}>
                    <div className="container mx-auto px-6 max-w-5xl flex justify-between items-center">
                        <a href="#home" className="flex items-center">
                            <img src="images/studio_logo_horizontal.png" alt="Straight Banana Logo" className="h-7 md:h-8 object-contain" />
                        </a>
                        <div className="hidden md:flex items-center space-x-8">
                            {links.map(link => (
                                <a key={link.href} href={link.href} className="text-[13px] font-bold text-[#42362A] hover:text-banana-500 transition-colors">
                                    {link.name}
                                </a>
                            ))}
                            <button
                                onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')}
                                className="flex items-center bg-[#E8E8E8] rounded-full px-0.5 py-0.5"
                            >
                                <span className={`text-[10px] px-2.5 py-1 rounded-full font-black transition-all ${lang === 'zh' ? 'bg-[#42362A] text-white' : 'text-[#999]'}`}>中</span>
                                <span className={`text-[10px] px-2.5 py-1 rounded-full font-black transition-all ${lang === 'en' ? 'bg-[#42362A] text-white' : 'text-[#999]'}`}>EN</span>
                            </button>
                        </div>
                        <button className="md:hidden text-[#42362A]" onClick={() => setMobileOpen(!mobileOpen)}>
                            {mobileOpen ? <XIcon /> : <MenuIcon />}
                        </button>
                    </div>
                    {mobileOpen && (
                        <div className="md:hidden bg-white border-t border-slate-100 p-6 absolute top-full left-0 w-full shadow-xl">
                            <div className="flex flex-col space-y-4">
                                {links.map(link => (
                                    <a key={link.href} href={link.href} className="text-lg font-bold text-[#42362A]" onClick={() => setMobileOpen(false)}>
                                        {link.name}
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        /* ===== HOME / HERO ===== */
        const Home = ({ t }) => (
            <section id="home" className="bg-white pt-32 pb-24 md:pt-40 md:pb-32">
                <div className="container mx-auto px-6 max-w-5xl">
                    <h1 className="text-5xl md:text-7xl font-black text-[#42362A] leading-tight mb-3">
                        {t.hero.title}<span className="highlight-yellow">{t.hero.titleHighlight}</span>
                    </h1>
                    <p className="text-xl md:text-3xl font-bold text-[#42362A] mb-10">
                        {t.hero.subtitle}
                    </p>
                    <div className="flex flex-wrap gap-3">
                        <a href="#games" className="bg-banana-500 text-[#42362A] px-7 py-3 rounded-full font-black text-base hover:brightness-105 transition-all">
                            {t.hero.btnGames}
                        </a>
                        <a href="#contact" className="bg-[#D9CDBE] text-[#42362A] px-7 py-3 rounded-full font-black text-base hover:brightness-105 transition-all">
                            {t.hero.btnContact}
                        </a>
                    </div>
                </div>
            </section>
        );

        /* ===== GAMES / PROJECTS ===== */
        const Projects = ({ t }) => {
            const videoRef = useRef(null);
            const handleMouseEnter = () => { if (videoRef.current) { videoRef.current.currentTime = 0; videoRef.current.play(); } };
            const handleMouseLeave = () => { if (videoRef.current) { videoRef.current.pause(); } };

            return (
                <section id="games" className="bg-[#E8E8E8] py-20 md:py-28">
                    <div className="container mx-auto px-6 max-w-5xl">
                        <h2 className="text-4xl md:text-5xl font-black text-[#42362A] mb-10">{t.games.title}</h2>

                        <div className="bg-white rounded-2xl overflow-hidden flex flex-col md:flex-row shadow-sm">
                            {/* Left: Image / Video */}
                            <div className="w-full md:w-[58%] relative overflow-hidden" onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave}>
                                <div className="aspect-[16/10]">
                                    <img src="images/key_art_landscape_zh.png" alt="Selfie Worm" className="w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0" />
                                    <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover opacity-0 hover:opacity-100 transition-opacity duration-500" src="videos/selfieworm_trailer_tw.webm" muted loop playsInline></video>
                                </div>
                                <div className="absolute top-3 left-3 bg-banana-500 text-[#42362A] px-3 py-1 rounded-full text-[10px] font-black">
                                    {t.games.tag}
                                </div>
                            </div>

                            {/* Right: Info */}
                            <div className="p-7 md:p-8 flex-1 flex flex-col justify-between">
                                <div>
                                    <h3 className="text-2xl font-black text-[#42362A] mb-3">{t.games.name}</h3>
                                    <p className="text-[13px] text-[#666] leading-relaxed">{t.games.desc}</p>
                                </div>

                                <div className="mt-6">
                                    <a href="https://store.steampowered.com/app/4333980/_/" target="_blank" className="inline-flex items-center bg-[#171a21] text-white rounded-full px-5 py-2.5 hover:bg-[#2a475e] transition-all mb-4">
                                        <img src="images/steam_logo_w.png" className="h-5 mr-2" alt="Steam" />
                                        <span className="text-sm font-bold">STEAM</span>
                                    </a>
                                    <div className="flex gap-5 text-[12px] text-[#999]">
                                        <a href="https://drive.google.com/drive/folders/1NM5Qd5FVoB7HKEoJyayg2bGUTvHMSugP?usp=drive_link" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 underline hover:text-[#42362A] transition-colors">
                                            Press Kit <img src="images/icon_linking.png" className="w-3.5 h-3.5 inline" />
                                        </a>
                                        <a href="pitch-deck.html" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 underline hover:text-[#42362A] transition-colors">
                                            Pitch Deck <img src="images/icon_linking.png" className="w-3.5 h-3.5 inline" />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        /* ===== ABOUT + TEAM ===== */
        const About = ({ t }) => (
            <section id="about" className="bg-white py-20 md:py-28">
                <div className="container mx-auto px-6 max-w-5xl">
                    {/* Section title */}
                    <h2 className="text-4xl md:text-5xl font-black text-[#42362A] mb-12">{t.about.title}</h2>

                    {/* Intro: text left, logo right */}
                    <div className="flex flex-col md:flex-row items-start gap-10 mb-20">
                        <div className="flex-1">
                            <h3 className="text-3xl md:text-4xl font-black text-[#42362A] leading-snug mb-1">
                                <span className="highlight-yellow">{t.about.introTitle}</span>
                            </h3>
                            <p className="text-lg md:text-xl font-bold text-[#42362A] leading-relaxed whitespace-pre-line">
                                {t.about.introDesc}
                                <span className="highlight-yellow-full">{t.about.introHighlight}</span>
                            </p>
                        </div>
                        <div className="w-full md:w-[35%] flex justify-center md:justify-end flex-shrink-0">
                            <img src="images/studio_logo.png" alt="Straight Banana" className="w-[200px] md:w-[220px]" />
                        </div>
                    </div>

                    {/* Team: title left, cards right */}
                    <div className="flex flex-col md:flex-row gap-8 md:gap-12">
                        <div className="w-full md:w-[22%] flex-shrink-0">
                            <h3 className="text-3xl md:text-4xl font-black text-[#42362A] leading-tight">{t.about.teamTitle}</h3>
                        </div>
                        <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-5">
                            {t.about.members.map((m, idx) => (
                                <div key={idx} className="bg-white p-8 rounded-xl border border-[#E8E8E8] flex flex-col">
                                    <h4 className="text-xl font-black text-[#42362A] mb-0.5">{m.name}</h4>
                                    <p className="text-[#999] text-[12px] font-bold mb-5">{m.role}</p>
                                    <p className="text-[#666] text-sm leading-relaxed">{m.intro}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </section>
        );

        /* ===== CONTACT ===== */
        const Contact = ({ t }) => {
            const [copyStatus, setCopyStatus] = useState(false);
            const email = "straight.banana.gamedev@gmail.com";

            const copyEmail = () => {
                navigator.clipboard.writeText(email);
                setCopyStatus(true);
                setTimeout(() => setCopyStatus(false), 2000);
            };

            const socialLinks = [
                { name: "Linktree", icon: "images/icon_linktree.png", url: "https://linktr.ee/straight_banana" },
                { name: "X (Twitter)", icon: "images/icon_x.png", url: "https://x.com/StrghtBanana" },
                { name: "Threads", icon: "images/icon_threads.png", url: "https://www.threads.com/@straight_banana_666" },
                { name: "Facebook", icon: "images/icon_fb.png", url: "https://www.facebook.com/StraightBanana/" },
            ];

            return (
                <section id="contact" className="bg-banana-500 py-20 md:py-28">
                    <div className="container mx-auto px-6 max-w-5xl">
                        <h2 className="text-4xl md:text-5xl font-black text-[#42362A] mb-12">{t.contact.title}</h2>

                        <div className="flex flex-col items-center gap-3 max-w-lg mx-auto">
                            {/* Email with copy button */}
                            <div className="relative w-full flex items-center">
                                <a href={`mailto:${email}`} className="flex-1 flex flex-col items-center justify-center bg-white rounded-full py-3 px-14 hover:scale-[1.01] transition-all duration-200 h-[64px] relative">
                                    <div className="absolute left-5 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center">
                                        <img src="images/icon_email.png" className="w-full h-full object-contain" alt="Email" />
                                    </div>
                                    <span className="text-[15px] font-black text-[#42362A]">Email</span>
                                    <span className="text-[10px] text-[#42362A]/50">{email}</span>
                                </a>
                                <button onClick={copyEmail} className="ml-3 p-2 hover:bg-black/5 rounded-full transition-all relative flex-shrink-0">
                                    <img src="images/icon_duplicate.png" className="w-5 h-5 opacity-50 hover:opacity-100 transition-opacity" />
                                    {copyStatus && (
                                        <span className="absolute -top-8 left-1/2 -translate-x-1/2 bg-[#42362A] text-white text-[10px] px-3 py-1 rounded-full whitespace-nowrap animate-copy-success">
                                            {t.contact.copySuccess}
                                        </span>
                                    )}
                                </button>
                            </div>

                            {/* Social links */}
                            {socialLinks.map((link, idx) => (
                                <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="w-full flex items-center justify-center relative bg-white rounded-full py-4 px-6 hover:scale-[1.01] transition-all duration-200 h-[56px]">
                                    <div className="absolute left-5 w-8 h-8 flex items-center justify-center">
                                        <img src={link.icon} className="w-full h-full object-contain" alt={link.name} />
                                    </div>
                                    <span className="font-black text-[15px] text-[#42362A]">{link.name}</span>
                                </a>
                            ))}
                        </div>

                        <div className="mt-20 text-center">
                            <p className="text-[#42362A]/30 text-[10px] font-bold tracking-widest">
                                © 2026 Straight Banana Game Studio.
                            </p>
                        </div>
                    </div>
                </section>
            );
        };

        /* ===== APP ===== */
        const App = () => {
            const [lang, setLang] = useState('zh');
            const t = translations[lang];
            return (
                <div className="bg-white selection:bg-banana-200 selection:text-banana-800">
                    <Navbar lang={lang} setLang={setLang} t={t} />
                    <Home t={t} />
                    <Projects t={t} />
                    <About t={t} />
                    <Contact t={t} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
