<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正直香蕉遊戲工作室 Straight Banana Game Studio</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="images/studio_favicon.png">
    <link rel="icon" type="image/svg+xml" href="images/studio_favicon.svg">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        banana: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#ffd543',
                            600: '#d97706',
                        },
                        studio: {
                            text: '#564c3b',
                            hover: '#bf9d64',
                            bg: '#edebe4',
                            intro: '#cdb58d',
                            gold: '#bf9d64',
                            contact: '#fbe69a',
                            contactHover: '#edebe4'
                        }
                    },
                    fontFamily: {
                        sans: ['LINE Seed JP', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'LINE Seed JP', sans-serif;
            background-color: #edebe4;
            color: #564c3b;
            overflow-x: hidden;
        }

        /* 錨點跳轉位置修正 */
        section {
            scroll-margin-top: 64px;
        }

        /* 手機版錨點位置微調 */
        @media (max-width: 767px) {

            #games,
            #about {
                scroll-margin-top: 16px;
            }
        }

        /* 確保每個 Section 起始高度一致且靠上 */
        .full-page-section {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 40px;
            scroll-snap-align: start;
            position: relative;
        }

        /* 漢堡選單按鈕 */
        .hamburger-line {
            display: block;
            width: 20px;
            height: 2px;
            background-color: #564c3b;
            border-radius: 2px;
            transition: all 0.3s ease;
            transform-origin: center center;
        }

        .hamburger-open .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger-open .hamburger-line:nth-child(2) {
            opacity: 0;
        }

        .hamburger-open .hamburger-line:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* 手機版下拉選單 - 佔上半畫面、置中 */
        .mobile-dropdown {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            height: calc(50vh - 56px);
            background: white;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-16px);
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 49;
        }

        .mobile-dropdown.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .mobile-dropdown a {
            display: block;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 400;
            color: #564c3b;
            transition: color 0.2s;
            text-align: center;
        }

        .mobile-dropdown a:hover {
            color: #bf9d64;
        }

        .mobile-dropdown a.active {
            font-weight: 900;
        }

        /* 手機版 RWD */
        @media (max-width: 767px) {
            .full-page-section {
                min-height: auto;
                padding-top: 80px;
                padding-bottom: 40px;
            }

            /* 首頁手機版特別處理 - 可調整 padding-top 控制起始高度 */
            #home.full-page-section {
                min-height: 100vh;
                padding-top: 25vh;
                padding-bottom: 0;
            }

            .contact-btn {
                width: auto;
                min-width: 0;
                max-width: 100%;
                padding-left: 56px;
                padding-right: 24px;
            }

            /* 手機版移除按鈕 hover 效果 */
            .standard-btn:hover {
                transform: none;
            }

            .contact-btn:hover {
                transform: none;
            }
        }

        .highlight-yellow {
            background-color: #ffd543;
            padding: 0 8px;
            display: inline;
            color: #564c3b;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }

        .highlight-yellow-full {
            background-color: #ffd543;
            padding: 2px 8px;
            display: inline;
            color: #564c3b;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }

        @keyframes copyFadeUp {
            0% {
                opacity: 0;
                transform: translate(-50%, 5px);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -2px);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -10px);
            }
        }

        .animate-copy-success {
            animation: copyFadeUp 1s ease-out forwards;
        }

        /* Nav Link 樣式 */
        .nav-link {
            font-size: 15px;
            color: #564c3b;
            transition: color 0.2s;
            position: relative;
            font-weight: 400;
        }

        .nav-link:not(.active):hover {
            color: #bf9d64;
        }

        .nav-link.active {
            font-weight: 900;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 1.5px;
            background-color: #564c3b;
        }

        /* 標準按鈕規格：144x48px */
        .standard-btn {
            width: 144px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            font-weight: 400;
            font-size: 15px;
            color: #564c3b;
            transition: all 0.3s;
        }

        .standard-btn:hover {
            transform: scale(1.05);
        }

        /* 遊戲展示區連結樣式 */
        .game-link {
            color: #564c3b;
            font-weight: 400;
            font-size: 13px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .game-link:hover {
            text-decoration: underline;
        }

        /* 聯絡按鈕規格化 */
        .contact-btn {
            width: 400px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            border-radius: 9999px;
            transition: all 0.3s;
            position: relative;
            flex-shrink: 0;
            font-weight: 400;
        }

        .contact-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Translations ---
        const translations = {
            zh: {
                nav: { home: '首頁', games: '我們的遊戲', about: '關於我們', contact: '聯絡我們' },
                hero: { title: '我們是', titleHighlight: '正直香蕉', subtitle: '來自台灣的雙人獨立遊戲工作室', btnGames: '我們的遊戲', btnContact: '聯絡我們' },
                games: {
                    title: '我們的遊戲',
                    tag: '2026/5 Demo版釋出',
                    name: '自拍蟲蟲',
                    desc: '一款結合軟 Q 物理與攝影的療癒之作。玩家將操作充滿彈性的蟲蟲，在缺乏色彩的異世界裡穿梭，透過自拍來找回世界的色彩，並拼湊出溫暖的故事。內建「防老闆鍵」與番茄鐘，讓每一次專注後的短暫休息，都成為療癒與驚喜的冒險，是你最完美的桌面夥伴。',
                    img: 'images/key_art_landscape_zh.png',
                    video: 'videos/selfieworm_trailer_tw.webm'
                },
                about: {
                    title: '關於我們',
                    introTitle: '我們熱愛製作',
                    introDesc: '有點奇怪、有點搞笑、又有點動人心弦的遊戲。\n特別喜歡那種說不上來的微妙感，',
                    introHighlight: '彷彿一根筆直的香蕉。',
                    teamTitle: '團隊成員',
                    members: [
                        { name: "Luke Liu", role: "Co-Founder, Game Designer", intro: "做遊戲比玩遊戲好玩。" },
                        { name: "Linda Huang", role: "Co-Founder, Technical Artist", intro: "細心觀察世界，轉化為給玩家的驚喜。" },
                    ]
                },
                contact: {
                    title: '聯絡我們',
                    copySuccess: '複製成功'
                }
            },
            en: {
                nav: { home: 'HOME', games: 'GAMES', about: 'ABOUT', contact: 'CONTACT' },
                hero: { title: 'We are ', titleHighlight: 'STRAIGHT BANANA', subtitle: 'A two-person indie game studio based in Taiwan.', btnGames: 'GAMES', btnContact: 'CONTACT' },
                games: {
                    title: 'OUR GAMES',
                    tag: 'Demo Available May 2026',
                    name: 'Selfie Worm',
                    desc: 'A cozy adventure blending squishy 2D physics with photography. Control a elastic worm through a colorless world, capturing selfies to restore vibrancy and uncover a heartwarming narrative. Featuring a built-in "Boss Key" and Pomodoro timer, it turns work breaks into healing times.',
                    img: 'images/key_art_landscape_en.png',
                    video: 'videos/selfieworm_trailer_en.webm'
                },
                about: {
                    title: 'ABOUT US',
                    introTitle: 'We Love Creating Games,',
                    introDesc: 'that are a bit weird, a bit funny, and a bit moving.\nWe especially love that indescribable subtle feeling,',
                    introHighlight: 'just like a STRAIGHT BANANA.',
                    teamTitle: 'TEAM',
                    members: [
                        { name: "Luke Liu", role: "Co-Founder, Game Designer", intro: "Making games is more fun than playing them." },
                        { name: "Linda Huang", role: "Co-Founder, Technical Artist", intro: "Observe the world with care, and turn it into a gift of wonder for players." },
                    ]
                },
                contact: {
                    title: 'CONTACT',
                    copySuccess: 'Email Copied'
                }
            }
        };

        const Navbar = ({ lang, setLang, t }) => {
            const [activeSection, setActiveSection] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setActiveSection(entry.target.id);
                        }
                    });
                }, { threshold: 0.3 });

                document.querySelectorAll('section').forEach(section => observer.observe(section));
                return () => observer.disconnect();
            }, []);

            const links = [
                { id: 'home', name: t.nav.home, href: '#home' },
                { id: 'games', name: t.nav.games, href: '#games' },
                { id: 'about', name: t.nav.about, href: '#about' },
                { id: 'contact', name: t.nav.contact, href: '#contact' },
            ];

            const LangToggle = () => (
                <div className="relative flex items-center bg-[#E8E8E8] rounded-full p-0.5 w-[72px] h-[28px] cursor-pointer overflow-hidden" onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')}>
                    <div className={`absolute top-0.5 bottom-0.5 w-[34px] bg-[#564c3b] rounded-full transition-all duration-300 ease-in-out ${lang === 'zh' ? 'left-0.5' : 'left-[36px]'}`}></div>
                    <span className={`flex-1 text-[10px] text-center z-10 transition-colors duration-300 font-normal ${lang === 'zh' ? 'text-white' : 'text-studio-text'}`}>中</span>
                    <span className={`flex-1 text-[10px] text-center z-10 transition-colors duration-300 font-normal ${lang === 'en' ? 'text-white' : 'text-studio-text'}`}>EN</span>
                </div>
            );

            return (
                <nav className="fixed w-full z-50 bg-white py-4">
                    <div className="container mx-auto px-6 max-w-5xl flex justify-between items-center relative">
                        <a href="#home" className="flex items-center">
                            <img src="images/studio_logo_horizontal.png" alt="Straight Banana Logo" className="h-8 object-contain" />
                        </a>
                        {/* 電腦版導覽 */}
                        <div className="hidden md:flex items-center space-x-8">
                            {links.map(link => (
                                <a
                                    key={link.href}
                                    href={link.href}
                                    className={`nav-link ${activeSection === link.id ? 'active' : ''}`}
                                >
                                    {link.name}
                                </a>
                            ))}
                            <LangToggle />
                        </div>
                        {/* 手機版：語言切換 + 漢堡按鈕 */}
                        <div className="flex md:hidden items-center gap-4">
                            <LangToggle />
                            <button
                                className={`flex flex-col justify-center items-center gap-[5px] w-8 h-8 ${mobileMenuOpen ? 'hamburger-open' : ''}`}
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                            >
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                        </div>
                    </div>
                    {/* 手機版下拉選單 - 放在 nav 外層容器之外以使用 fixed 定位 */}
                    <div className={`mobile-dropdown md:hidden ${mobileMenuOpen ? 'open' : ''}`}>
                        {links.map(link => (
                            <a
                                key={link.href}
                                href={link.href}
                                className={activeSection === link.id ? 'active' : ''}
                                onClick={() => setMobileMenuOpen(false)}
                            >
                                {link.name}
                            </a>
                        ))}
                    </div>
                </nav>
            );
        };

        const Home = ({ t, lang }) => {
            const videoRef = useRef(null);

            useEffect(() => {
                const video = videoRef.current;
                if (video) {
                    const handleTimeUpdate = () => {
                        if (video.currentTime >= 10) {
                            video.currentTime = 0;
                            video.play();
                        }
                    };
                    video.addEventListener('timeupdate', handleTimeUpdate);
                    return () => video.removeEventListener('timeupdate', handleTimeUpdate);
                }
            }, []);

            return (
                <section id="home" className="full-page-section bg-studio-bg overflow-hidden items-center md:!items-center !items-start pt-[25vh] md:!pt-0 md:!min-h-screen">
                    {/* 背景影片 + 底部淡出遮罩 */}
                    <div className="absolute inset-0 pointer-events-none">
                        <video
                            ref={videoRef}
                            className="w-full h-full object-cover opacity-[0.05]"
                            src="videos/selfieworm_trailer_tw.webm"
                            autoPlay muted playsInline
                        ></video>
                        {/* 底部漸層淡出：高度 30% 可調，從透明漸變到背景色 */}
                        <div className="absolute bottom-0 left-0 right-0" style={{ height: '20%', background: 'linear-gradient(to bottom, transparent, #edebe4)' }}></div>
                    </div>

                    <div className="container mx-auto px-6 max-w-5xl relative z-10">
                        <h1 className="text-5xl md:text-7xl font-black leading-[1.2] mb-3">
                            <span className="text-studio-gold block">{t.hero.title}</span>
                            <span className="highlight-yellow whitespace-normal md:whitespace-nowrap inline-block mt-2">{t.hero.titleHighlight.trim()}</span>
                        </h1>
                        <p className="text-xl md:text-3xl font-bold mb-16">
                            {t.hero.subtitle}
                        </p>
                        <div className="flex flex-col md:flex-row flex-wrap gap-5 pb-16 md:pb-0">
                            <a href="#games" className="standard-btn bg-banana-500 md:hover:brightness-105">
                                {t.hero.btnGames}
                            </a>
                            <a href="#contact" className="standard-btn bg-[#D9CDBE] md:hover:brightness-105">
                                {t.hero.btnContact}
                            </a>
                        </div>
                    </div>
                </section>
            );
        }

        const Projects = ({ t, lang }) => {
            const videoRef = useRef(null);
            const containerRef = useRef(null);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            // 偵測螢幕寬度
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // 電腦版：懸停播放
            const handleMouseEnter = () => { if (!isMobile && videoRef.current) { videoRef.current.currentTime = 0; videoRef.current.play(); } };
            const handleMouseLeave = () => { if (!isMobile && videoRef.current) { videoRef.current.pause(); } };

            // 手機版：滾動進入畫面時自動播放（類似 FB 機制）
            useEffect(() => {
                if (!isMobile) return;
                const video = videoRef.current;
                const container = containerRef.current;
                if (!video || !container) return;

                let playTimer = null;
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            // 停留 1 秒後再開始播放
                            playTimer = setTimeout(() => {
                                video.style.opacity = '1';
                                video.currentTime = 0;
                                video.play().catch(() => { });
                            }, 1000);
                        } else {
                            if (playTimer) clearTimeout(playTimer);
                            video.pause();
                            video.style.opacity = '0';
                        }
                    });
                }, { threshold: 0.5 });

                observer.observe(container);
                return () => {
                    observer.disconnect();
                    if (playTimer) clearTimeout(playTimer);
                };
            }, [isMobile, t.games.video]);

            // 處理第一句加粗
            const fullDesc = t.games.desc;
            const terminator = lang === 'zh' ? '。' : '. ';
            const splitIndex = fullDesc.indexOf(terminator);

            let firstPart = fullDesc;
            let restPart = "";

            if (splitIndex !== -1) {
                firstPart = fullDesc.substring(0, splitIndex + terminator.length);
                restPart = fullDesc.substring(splitIndex + terminator.length);
            }

            return (
                <section id="games" className="full-page-section bg-studio-bg">
                    <div className="container mx-auto px-6 max-w-5xl">
                        <h2 className="text-4xl md:text-5xl font-black mb-12">{t.games.title}</h2>

                        <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-3 mb-4">
                            <h3 className="text-2xl md:text-3xl font-bold">{t.games.name}</h3>
                            <div className="bg-studio-text px-3 py-1 rounded-full text-[12px] font-normal text-white w-fit">
                                {t.games.tag}
                            </div>
                        </div>

                        <div className="rounded-[10px] overflow-hidden flex flex-col md:flex-row shadow-none border border-white/20">
                            <div
                                ref={containerRef}
                                className="flex-1 relative overflow-hidden bg-studio-bg"
                                onMouseEnter={handleMouseEnter}
                                onMouseLeave={handleMouseLeave}
                            >
                                <div className="aspect-video relative overflow-hidden">
                                    <img src={t.games.img} alt="Selfie Worm" className="w-full h-full object-cover" />
                                    <video ref={videoRef} className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-500 scale-[1.01] ${isMobile ? 'opacity-0' : 'opacity-0 hover:opacity-100'}`} src={t.games.video} muted loop playsInline></video>
                                </div>
                            </div>

                            {/* 將左側內距再增加 8px (半個字元寬) */}
                            <div className="p-5 pl-7 md:p-4 md:pl-6 w-full md:w-[400px] bg-white flex flex-col justify-between border-y border-r border-white/20">
                                <div>
                                    <p className="text-[15px] opacity-80 leading-relaxed text-left">
                                        <span className="font-bold text-studio-text opacity-100">{firstPart}</span>
                                        {restPart}
                                    </p>
                                </div>
                                <div className="mt-4">
                                    <a href="https://store.steampowered.com/app/4333980/_/" target="_blank" className="standard-btn bg-[#171a21] text-white hover:bg-[#2a475e] transition-all mb-4 !w-[144px]">
                                        <img src="images/steam_logo_w.png" className="h-6" alt="Steam" />
                                    </a>
                                    <div className="flex items-center gap-4">
                                        <a href="https://drive.google.com/drive/folders/1NM5Qd5FVoB7HKEoJyayg2bGUTvHMSugP?usp=drive_link" target="_blank" className="game-link flex items-center gap-1">
                                            Press Kit <img src="images/icon_linking.png" className="w-3.5 h-3.5" style={{ filter: 'invert(27%) sepia(13%) saturate(583%) hue-rotate(5deg) brightness(85%) contrast(110%)' }} />
                                        </a>
                                        <a href="pitch-deck.html" target="_blank" className="game-link flex items-center gap-1">
                                            Pitch Deck <img src="images/icon_linking.png" className="w-3.5 h-3.5" style={{ filter: 'invert(27%) sepia(13%) saturate(583%) hue-rotate(5deg) brightness(85%) contrast(110%)' }} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const About = ({ t }) => (
            <section id="about" className="full-page-section bg-studio-bg">
                <div className="container mx-auto px-6 max-w-5xl">
                    <h2 className="text-4xl md:text-5xl font-black mb-8 md:mb-12">{t.about.title}</h2>
                    {/* 手機版 Studio Logo */}
                    <div className="md:hidden flex justify-center mb-10">
                        <img src="images/studio_logo.png" alt="Straight Banana" className="w-[70%]" />
                    </div>
                    <div className="flex flex-col md:flex-row items-start gap-6 md:gap-10 mb-12 md:mb-20 relative">
                        <div className="md:w-[70%] z-10">
                            <h3 className="text-2xl md:text-4xl font-black leading-relaxed mb-1 text-studio-gold">
                                {t.about.introTitle}
                            </h3>
                            <div className="text-base md:text-2xl font-bold leading-[1.8] text-left">
                                {t.about.introDesc.split('\n').map((line, i) => (
                                    <div key={i} className={i === 0 ? "mb-4" : ""}>
                                        {line}
                                    </div>
                                ))}
                                <div className="mt-2">
                                    <span className="highlight-yellow-full inline-block">{t.about.introHighlight}</span>
                                </div>
                            </div>
                        </div>
                        {/* 電腦版 Studio Logo */}
                        <div className="hidden md:block absolute right-[0px] top-[-70px] translate-x-[-10px] z-0 opacity-100">
                            <img src="images/studio_logo.png" alt="Straight Banana" className="w-[280px] scale-[1] origin-center" />
                        </div>
                    </div>
                    <div className="flex flex-col md:flex-row gap-6 md:gap-12 mt-8 md:mt-[120px]">
                        <div className="w-full md:w-[22%]">
                            <h3 className="text-3xl md:text-4xl font-black leading-tight">{t.about.teamTitle}</h3>
                        </div>
                        <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-5">
                            {t.about.members.map((m, idx) => (
                                <div key={idx} className="bg-white p-8 rounded-[10px] border border-transparent flex flex-col">
                                    <h4 className="text-xl font-black mb-0.5">{m.name}</h4>
                                    <p className="text-studio-text text-[15px] font-normal mb-5">{m.role}</p>
                                    <p className="text-studio-text text-[15px] leading-relaxed opacity-80 text-left">{m.intro}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </section>
        );

        const Contact = ({ t }) => {
            const [copyStatus, setCopyStatus] = useState(false);
            const email = "straight.banana.gamedev@gmail.com";
            const copyEmail = () => {
                navigator.clipboard.writeText(email);
                setCopyStatus(true);
                setTimeout(() => setCopyStatus(false), 2000);
            };

            const socialLinks = [
                { name: "Linktree", icon: "images/icon_linktree.png", url: "https://linktr.ee/straight_banana" },
                { name: "X (Twitter)", icon: "images/icon_x.png", url: "https://x.com/StrghtBanana" },
                { name: "Threads", icon: "images/icon_threads.png", url: "https://www.threads.com/@straight_banana_666" },
                { name: "Facebook", icon: "images/icon_fb.png", url: "https://www.facebook.com/StraightBanana/" },
            ];

            return (
                <section id="contact" className="bg-studio-contact min-h-[calc(100vh-110px)] flex items-start justify-center pt-[40px] pb-[40px] scroll-snap-align-start">
                    <div className="container mx-auto px-6 max-w-5xl relative">
                        <div className="md:absolute left-0 top-0 w-full md:w-[22%]">
                            <h2 className="text-4xl md:text-5xl font-black text-studio-text">{t.contact.title}</h2>
                        </div>

                        <div className="flex flex-col items-center gap-4 mt-6 md:mt-[140px] w-full">
                            <div className="flex items-center gap-3 justify-center w-full relative">
                                <div className="w-9 hidden md:block"></div>
                                <div className="contact-btn">
                                    <a href={`mailto:${email}`} className="flex flex-col items-center justify-center w-full h-full">
                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center">
                                            <img src="images/icon_email.png" className="w-full h-full object-contain" alt="Email" />
                                        </div>
                                        <span className="text-[13px] md:text-[15px] font-normal">Email</span>
                                        <span className="text-[9px] md:text-[10px] text-studio-text">{email}</span>
                                    </a>
                                </div>
                                <button onClick={copyEmail} className="hidden md:block p-2 transition-all relative flex-shrink-0">
                                    <img src="images/icon_duplicate.png" className="w-5 h-5 opacity-40 hover:opacity-100" />
                                    {copyStatus && (
                                        <span className="absolute -top-10 left-1/2 -translate-x-1/2 bg-[#564c3b] text-white text-[10px] px-3 py-1 rounded-full whitespace-nowrap animate-copy-success">
                                            {t.contact.copySuccess}
                                        </span>
                                    )}
                                </button>
                            </div>
                            {socialLinks.map((link, idx) => (
                                <a key={idx} href={link.url} target="_blank" className="contact-btn font-normal text-[15px]">
                                    <div className="absolute left-5 w-8 h-8 flex items-center justify-center">
                                        <img src={link.icon} className="w-full h-full object-contain" alt={link.name} />
                                    </div>
                                    {link.name}
                                </a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="bg-studio-bg py-6 text-center">
                <p className="text-[11px] font-normal tracking-widest text-studio-text opacity-80">© 2026 Straight Banana Game Studio.</p>
            </footer>
        );

        const App = () => {
            const [lang, setLang] = useState('zh');
            const t = translations[lang];
            return (
                <div className="bg-studio-bg selection:bg-banana-200 selection:text-banana-800">
                    <Navbar lang={lang} setLang={setLang} t={t} />
                    <Home t={t} lang={lang} />
                    <Projects t={t} lang={lang} />
                    <About t={t} />
                    <Contact t={t} />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
